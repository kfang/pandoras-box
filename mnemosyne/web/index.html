<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mnemosyne</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f7fafc;
      color: #2d3748;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    header h1 { font-size: 1.5rem; }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .tabs button {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      background: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .tabs button.active {
      background: #2d3748;
      color: white;
      border-color: #2d3748;
    }

    .badge {
      background: #e53e3e;
      color: white;
      border-radius: 9999px;
      padding: 0.1rem 0.5rem;
      font-size: 0.75rem;
      margin-left: 0.25rem;
    }

    .scan-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      background: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .scan-btn:hover { background: #edf2f7; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .connection { font-size: 0.75rem; color: #e53e3e; }
    .connection.connected { color: #38a169; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }

    .breadcrumb button {
      background: none;
      border: none;
      cursor: pointer;
      color: #4a90d9;
      padding: 0.25rem;
      font-size: 0.875rem;
    }

    .breadcrumb button:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #a0aec0; }

    .entries {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }

    .folder {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      background: white;
      font-size: 0.875rem;
      font-weight: 500;
      width: 100%;
      text-align: center;
    }

    .folder:hover { background: #edf2f7; }

    .image-card {
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      overflow: hidden;
      background: white;
    }

    .thumb-wrap {
      position: relative;
    }

    .image-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #edf2f7;
    }

    .type-badge {
      position: absolute;
      top: 0.375rem;
      right: 0.375rem;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      line-height: 1.2;
      color: white;
    }

    .type-badge.raw { background: #d69e2e; }
    .type-badge.video { background: #e53e3e; }
    .type-badge.jpeg { background: #38a169; }
    .type-badge.other { background: #718096; }

    .image-card .name {
      padding: 0.5rem;
      font-size: 0.75rem;
      color: #4a5568;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .import-item {
      display: flex;
      gap: 1rem;
      padding: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      align-items: center;
    }

    .import-item .filename {
      flex: 1;
      font-family: monospace;
      font-size: 0.875rem;
    }

    .import-item .state {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .state-queued { color: #718096; }
    .state-processing { color: #d69e2e; }
    .state-done { color: #38a169; }
    .state-error { color: #e53e3e; }

    .import-item .message {
      font-size: 0.75rem;
      color: #718096;
    }

    .empty {
      color: #a0aec0;
      text-align: center;
      padding: 2rem;
    }

    .viewer {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 6rem);
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 1rem;
    }

    .viewer-toolbar button {
      padding: 0.375rem 0.75rem;
      border: 1px solid #e2e8f0;
      background: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .viewer-toolbar button:hover { background: #edf2f7; }

    .viewer-toolbar .vw-name {
      font-weight: 500;
      font-size: 0.875rem;
    }

    .viewer-toolbar .vw-nav {
      margin-left: auto;
      display: flex;
      gap: 0.25rem;
    }

    .viewer-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a202c;
      border-radius: 0.5rem;
      overflow: hidden;
      min-height: 0;
    }

    .viewer-content img, .viewer-content video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .select-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #2d3748;
      color: white;
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .select-bar button {
      padding: 0.375rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .select-bar button:hover { background: rgba(255,255,255,0.1); }

    .select-bar .trash-btn {
      background: #e53e3e;
      border-color: #e53e3e;
      margin-left: auto;
    }

    .select-bar .trash-btn:hover { background: #c53030; }

    .dup-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #2d3748;
      color: white;
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .dup-header button {
      padding: 0.375rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .dup-header button:hover { background: rgba(255,255,255,0.1); }
    .dup-header button:disabled { opacity: 0.5; cursor: not-allowed; }

    .dup-header .trash-btn {
      background: #e53e3e;
      border-color: #e53e3e;
    }

    .dup-header .trash-btn:hover { background: #c53030; }

    .dup-group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .dup-card {
      border: 2px solid #e2e8f0;
      border-radius: 0.5rem;
      overflow: hidden;
      background: white;
      transition: border-color 0.15s;
    }

    .dup-card.marked {
      border-color: #e53e3e;
      opacity: 0.6;
    }

    .dup-card.comparing {
      border-color: #4a90d9;
    }

    .dup-card .dup-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: contain;
      display: block;
      background: #1a202c;
    }

    .dup-card .dup-info {
      padding: 0.5rem;
      font-size: 0.75rem;
      color: #4a5568;
    }

    .dup-card .dup-info .dup-path {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dup-card .dup-actions {
      display: flex;
      gap: 0.375rem;
      margin-top: 0.375rem;
    }

    .dup-card .dup-actions button {
      padding: 0.25rem 0.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.25rem;
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      background: white;
    }

    .dup-card .dup-actions button:hover { background: #edf2f7; }

    .dup-btn-trash { color: #e53e3e; border-color: #e53e3e !important; }
    .dup-btn-trash.active { background: #e53e3e !important; color: white; }
    .dup-btn-compare { color: #4a90d9; border-color: #4a90d9 !important; }
    .dup-btn-compare.active { background: #4a90d9 !important; color: white; }

    .dup-label {
      display: inline-block;
      padding: 0.125rem 0.375rem;
      border-radius: 0.25rem;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .dup-label.keep { background: #c6f6d5; color: #276749; }
    .dup-label.trash { background: #fed7d7; color: #9b2c2c; }

    .dup-compare-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .dup-compare-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: #1a202c;
      color: white;
      font-size: 0.875rem;
    }

    .dup-compare-toolbar button {
      padding: 0.375rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }

    .dup-compare-toolbar button:hover { background: rgba(255,255,255,0.1); }

    .dup-compare-panes {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .dup-compare-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid #2d3748;
    }

    .dup-compare-pane:last-child { border-right: none; }

    .dup-compare-pane .pane-label {
      text-align: center;
      padding: 0.375rem;
      font-size: 0.75rem;
      color: #a0aec0;
      background: #1a202c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dup-compare-pane .pane-img {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
      cursor: grab;
    }

    .dup-compare-pane .pane-img.dragging { cursor: grabbing; }

    .dup-compare-pane .pane-img img,
    .dup-compare-pane .pane-img video {
      position: absolute;
      transform-origin: 0 0;
      max-width: none;
      max-height: none;
      top: 0;
      left: 0;
    }

    .image-card.selectable { cursor: pointer; }

    .image-card.selected {
      outline: 3px solid #4a90d9;
      outline-offset: -3px;
    }

    .select-check {
      position: absolute;
      top: 0.375rem;
      left: 0.375rem;
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 50%;
      border: 2px solid white;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: white;
    }

    .image-card.selected .select-check {
      background: #4a90d9;
      border-color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="shell" x-data="app()" x-init="init()">
    <header>
      <h1>Mnemosyne</h1>
      <nav class="tabs">
        <button :class="{ active: view === 'browse' }" @click="view = 'browse'; updateHash()">Library</button>
        <button :class="{ active: view === 'trash' }" @click="view = 'trash'; browseTrash('')">Trash</button>
        <button :class="{ active: view === 'import' }" @click="view = 'import'; updateHash()">
          Import
          <template x-if="activeCount > 0">
            <span class="badge" x-text="activeCount"></span>
          </template>
        </button>
      </nav>
      <button class="scan-btn" @click="scan()" :disabled="scanning" x-text="scanning ? 'Scanning...' : 'Scan Import'"></button>
      <span class="connection" :class="{ connected }" x-text="connected ? 'Connected' : 'Disconnected'"></span>
    </header>

    <!-- Browse view -->
    <template x-if="view === 'browse'">
      <div>
        <div class="breadcrumb">
          <button @click="browse('')">Library</button>
          <template x-for="seg in pathSegments()" :key="seg.path">
            <span>
              <span class="sep">/</span>
              <button @click="browse(seg.path)" x-text="seg.name"></button>
            </span>
          </template>
        </div>

        <template x-if="selecting">
          <div class="select-bar">
            <span x-text="selected.size + ' selected'"></span>
            <button @click="selectAll()">Select All</button>
            <button @click="selectNone()">Select None</button>
            <button @click="selecting = false; selected.clear()">Cancel</button>
            <button class="trash-btn" @click="trashSelected()" :disabled="selected.size === 0">Trash</button>
          </div>
        </template>

        <template x-if="!selecting && images.length > 0">
          <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
            <button class="scan-btn" @click="selecting = true">Select</button>
            <button class="scan-btn" @click="findDuplicates()" :disabled="dupScanning" x-text="dupScanning ? 'Scanning...' : 'Find Duplicates'"></button>
            <label style="display:flex; align-items:center; gap:0.375rem; font-size:0.8rem; color:#4a5568;">
              Threshold
              <input type="range" min="0" max="20" x-model.number="dupThreshold" style="width:80px;" />
              <span x-text="dupThreshold" style="min-width:1.25rem;"></span>
            </label>
          </div>
        </template>

        <div class="entries">
          <template x-if="currentPath">
            <button class="folder" @click="navigateUp()">..</button>
          </template>

          <template x-for="e in folders" :key="currentPath + '/' + e.name">
            <button class="folder" @click="browse(currentPath ? currentPath + '/' + e.name : e.name)" x-text="e.name"></button>
          </template>

          <template x-for="e in images" :key="currentPath + '/' + e.name">
            <div class="image-card" :class="{ selectable: selecting, selected: selected.has(filePath(e.name)) }" @click="selecting ? toggleSelect(e.name) : openViewer(filePath(e.name))">
              <div class="thumb-wrap">
                <template x-if="selecting">
                  <div class="select-check" x-text="selected.has(filePath(e.name)) ? '✓' : ''"></div>
                </template>
                <img :src="'/api/thumbnail/' + filePath(e.name)" :alt="e.name" loading="lazy" />
                <span class="type-badge" :class="fileType(e.name).type" x-text="fileType(e.name).label"></span>
              </div>
              <div class="name" x-text="e.name"></div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Duplicates review -->
    <template x-if="view === 'duplicates'">
      <div>
        <div class="dup-header">
          <button @click="dupBack()">&larr; Back</button>
          <span x-text="'Group ' + (dupIndex + 1) + ' of ' + dupGroups.length + ' (' + dupGroups[dupIndex].files.length + ' files)'"></span>
          <span style="margin-left: auto; display: flex; gap: 0.5rem;">
            <button @click="dupCompareOpen()" :disabled="dupCompare.size < 2">Compare (<span x-text="dupCompare.size"></span>)</button>
            <button @click="dupSkip()" :disabled="dupIndex >= dupGroups.length - 1">Skip</button>
            <button class="trash-btn" @click="dupTrash()" :disabled="dupMarked.size === 0">Trash (<span x-text="dupMarked.size"></span>)</button>
          </span>
        </div>

        <div class="dup-group-grid">
          <template x-for="(file, fi) in dupGroups[dupIndex].files" :key="file">
            <div class="dup-card" :class="{ marked: dupMarked.has(file), comparing: dupCompare.has(file) }">
              <div class="thumb-wrap" style="position:relative;">
                <img class="dup-thumb" :src="'/api/thumbnail/' + file" loading="lazy" />
                <span class="type-badge" :class="fileType(file).type" x-text="fileType(file).label"></span>
              </div>
              <div class="dup-info">
                <div class="dup-path" x-text="file"></div>
                <div class="dup-actions">
                  <button class="dup-btn-trash" :class="{ active: dupMarked.has(file) }" @click="toggleDupMark(file)" x-text="dupMarked.has(file) ? 'Marked' : 'Trash'"></button>
                  <button class="dup-btn-compare" :class="{ active: dupCompare.has(file) }" @click="toggleDupCompare(file)" x-text="dupCompare.has(file) ? 'Selected' : 'Compare'"></button>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Compare overlay -->
        <template x-if="dupComparing">
          <div class="dup-compare-overlay" @keydown.escape.window="dupComparing = false">
            <div class="dup-compare-toolbar">
              <button @click="dupComparing = false">&larr; Close</button>
              <span x-text="'Comparing ' + dupCompareFiles.length + ' files'"></span>
              <span x-text="currentZoomPct + '%'" style="margin-left:auto; font-size:0.75rem; color:#a0aec0;"></span>
              <button @click="zoomReset()">Fit</button>
              <button @click="zoomTo(1)">100%</button>
              <label style="display:flex; align-items:center; gap:0.375rem; font-size:0.75rem; color:#a0aec0;">
                <input type="checkbox" x-model="zoomSynced" /> Sync
              </label>
            </div>
            <div class="dup-compare-panes">
              <template x-for="(file, pi) in dupCompareFiles" :key="'cmp-' + file">
                <div class="dup-compare-pane">
                  <div class="pane-label" x-text="file.split('/').pop()"></div>
                  <div class="pane-img"
                       @wheel.prevent="zoomWheel($event, pi)"
                       @mousedown.prevent="panStart($event, pi)"
                       @mousemove.prevent="panMove($event, pi)"
                       @mouseup.prevent="panEnd()"
                       @mouseleave="panEnd()"
                       :class="{ dragging: panActive }"
                       :data-pane="pi">
                    <template x-if="isVideo(file)">
                      <video :src="'/api/file/' + file" controls style="max-width:100%; max-height:100%;"></video>
                    </template>
                    <template x-if="isRaw(file)">
                      <img :src="'/api/preview/' + file"
                           :style="paneStyle(pi)"
                           @load="zoomFit($event, pi)" />
                    </template>
                    <template x-if="!isVideo(file) && !isRaw(file)">
                      <img :src="'/api/file/' + file"
                           :style="paneStyle(pi)"
                           @load="zoomFit($event, pi)" />
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Trash view -->
    <template x-if="view === 'trash'">
      <div>
        <div class="breadcrumb">
          <button @click="browseTrash('')">Trash</button>
          <template x-for="seg in trashPathSegments()" :key="seg.path">
            <span>
              <span class="sep">/</span>
              <button @click="browseTrash(seg.path)" x-text="seg.name"></button>
            </span>
          </template>
        </div>

        <template x-if="trashSelecting">
          <div class="select-bar">
            <span x-text="trashSelected.size + ' selected'"></span>
            <button @click="trashSelectAll()">Select All</button>
            <button @click="trashSelectNone()">Select None</button>
            <button @click="trashSelecting = false; trashSelected.clear()">Cancel</button>
            <button @click="restoreSelected()" :disabled="trashSelected.size === 0" style="margin-left: auto;">Restore</button>
            <button class="trash-btn" @click="emptyTrash()">Empty Trash</button>
          </div>
        </template>

        <template x-if="!trashSelecting && trashImages.length > 0">
          <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
            <button class="scan-btn" @click="trashSelecting = true">Select</button>
          </div>
        </template>

        <template x-if="trashEntries.length === 0 && trashFolders.length === 0">
          <p class="empty">Trash is empty.</p>
        </template>

        <div class="entries">
          <template x-if="trashPath">
            <button class="folder" @click="trashNavigateUp()">..</button>
          </template>

          <template x-for="e in trashFolders" :key="'trash/' + trashPath + '/' + e.name">
            <button class="folder" @click="browseTrash(trashPath ? trashPath + '/' + e.name : e.name)" x-text="e.name"></button>
          </template>

          <template x-for="e in trashImages" :key="'trash/' + trashPath + '/' + e.name">
            <div class="image-card" :class="{ selectable: trashSelecting, selected: trashSelected.has(trashFilePath(e.name)) }" @click="trashSelecting && toggleTrashSelect(e.name)">
              <div class="thumb-wrap">
                <template x-if="trashSelecting">
                  <div class="select-check" x-text="trashSelected.has(trashFilePath(e.name)) ? '✓' : ''"></div>
                </template>
                <img :src="'/api/thumbnail/.trash/' + trashFilePath(e.name)" :alt="e.name" loading="lazy" />
                <span class="type-badge" :class="fileType(e.name).type" x-text="fileType(e.name).label"></span>
              </div>
              <div class="name" x-text="e.name"></div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Import view -->
    <template x-if="view === 'import'">
      <div>
        <template x-if="statuses.length === 0">
          <p class="empty">No import activity yet.</p>
        </template>
        <template x-for="s in statuses" :key="s.file">
          <div class="import-item">
            <span class="filename" x-text="s.file.split('/').pop()"></span>
            <span class="state" :class="'state-' + s.state" x-text="s.state"></span>
            <template x-if="s.message">
              <span class="message" x-text="s.message"></span>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- Viewer -->
    <template x-if="view === 'viewer'">
      <div class="viewer" @keydown.left.window="viewerPrev()" @keydown.right.window="viewerNext()">
        <div class="viewer-toolbar">
          <button @click="viewerBack()">&larr; Back</button>
          <span class="vw-name" x-text="viewerFile.split('/').pop()"></span>
          <span class="type-badge" :class="fileType(viewerFile).type" x-text="fileType(viewerFile).label" style="position:static;"></span>
          <div class="vw-nav">
            <button @click="viewerPrev()" :disabled="viewerIndex <= 0">&lsaquo; Prev</button>
            <button @click="viewerNext()" :disabled="viewerIndex >= viewerSiblings.length - 1">Next &rsaquo;</button>
          </div>
        </div>
        <div class="viewer-content">
          <template x-if="isVideo(viewerFile)">
            <video :src="'/api/file/' + viewerFile" controls autoplay></video>
          </template>
          <template x-if="isRaw(viewerFile)">
            <img :src="'/api/preview/' + viewerFile" />
          </template>
          <template x-if="!isVideo(viewerFile) && !isRaw(viewerFile)">
            <img :src="'/api/file/' + viewerFile" />
          </template>
        </div>
      </div>
    </template>
  </div>

  <script>
    const MEDIA_EXTS = new Set([
      ".jpg", ".jpeg", ".png", ".tiff", ".tif", ".webp",
      ".heic", ".heif", ".avif",
      ".cr2", ".cr3", ".nef", ".arw", ".raf", ".orf",
      ".rw2", ".dng", ".pef", ".srw", ".x3f", ".iiq",
      ".mov", ".mp4", ".avi", ".mkv", ".mts", ".m2ts",
      ".wmv", ".webm", ".m4v",
    ]);

    const RAW_EXTS = new Set([
      ".cr2", ".cr3", ".nef", ".arw", ".raf", ".orf",
      ".rw2", ".dng", ".pef", ".srw", ".x3f", ".iiq",
    ]);

    const VIDEO_EXTS = new Set([
      ".mov", ".mp4", ".avi", ".mkv", ".mts", ".m2ts",
      ".wmv", ".webm", ".m4v",
    ]);

    function isMedia(name) {
      const dot = name.lastIndexOf(".");
      return dot !== -1 && MEDIA_EXTS.has(name.slice(dot).toLowerCase());
    }

    function extOf(name) {
      const dot = name.lastIndexOf(".");
      return dot !== -1 ? name.slice(dot).toLowerCase() : "";
    }

    function app() {
      return {
        view: "browse",
        connected: false,
        scanning: false,
        selecting: false,
        selected: new Set(),
        currentPath: "",
        entries: [],
        statuses: [],
        viewerFile: "",
        viewerSiblings: [],
        viewerReturnHash: "",
        trashPath: "",
        trashEntries: [],
        trashSelecting: false,
        trashSelected: new Set(),
        dupScanning: false,
        dupThreshold: 10,
        dupGroups: [],
        dupIndex: 0,
        dupMarked: new Set(),
        dupCompare: new Set(),
        dupComparing: false,
        dupCompareFiles: [],
        dupReturnHash: "",
        panes: [],
        panActive: false,
        panStartX: 0,
        panStartY: 0,
        panOriginX: 0,
        panOriginY: 0,
        panActivePane: -1,
        zoomSynced: true,

        get folders() {
          return this.entries.filter(e => e.isDir);
        },
        get images() {
          return this.entries.filter(e => !e.isDir && isMedia(e.name));
        },
        get trashFolders() {
          return this.trashEntries.filter(e => e.isDir);
        },
        get trashImages() {
          return this.trashEntries.filter(e => !e.isDir && isMedia(e.name));
        },
        get activeCount() {
          return this.statuses.filter(s => s.state === "queued" || s.state === "processing").length;
        },

        init() {
          this.loadFromHash();
          this.connectWs();
          window.addEventListener("hashchange", () => this.loadFromHash());
        },

        loadFromHash() {
          const hash = location.hash.replace(/^#\/?/, "");
          if (hash.startsWith("view/")) {
            const file = hash.replace(/^view\//, "");
            this.openViewer(file, false);
          } else if (hash.startsWith("trash")) {
            this.view = "trash";
            this.browseTrash(hash.replace(/^trash\/?/, ""));
          } else if (hash === "import") {
            this.view = "import";
          } else {
            this.view = "browse";
            const path = hash.replace(/^library\/?/, "");
            this.browse(path);
          }
        },

        updateHash() {
          let hash;
          if (this.view === "viewer") {
            hash = "view/" + this.viewerFile;
          } else if (this.view === "trash") {
            hash = this.trashPath ? "trash/" + this.trashPath : "trash";
          } else if (this.view === "import") {
            hash = "import";
          } else {
            hash = this.currentPath ? "library/" + this.currentPath : "";
          }
          history.replaceState(null, "", "#/" + hash);
        },

        async browse(path) {
          this.currentPath = path;
          this.entries = [];
          this.selected = new Set();
          this.selecting = false;
          this.updateHash();
          try {
            const res = await fetch("/api/browse?path=" + encodeURIComponent(path));
            if (res.ok) {
              this.entries = await res.json() ?? [];
            }
          } catch {
            this.entries = [];
          }
        },

        async scan() {
          this.scanning = true;
          try {
            await fetch("/api/scan", { method: "POST" });
          } catch {}
          this.scanning = false;
        },

        isVideo(path) {
          return VIDEO_EXTS.has(extOf(path));
        },

        isRaw(path) {
          return RAW_EXTS.has(extOf(path));
        },

        openViewer(file, saveReturn = true) {
          if (saveReturn && this.view !== "viewer") {
            this.viewerReturnHash = location.hash;
          }
          this.viewerFile = file;
          // Build siblings list from current folder context
          if (this.viewerSiblings.length === 0 || !this.viewerSiblings.includes(file)) {
            const dir = file.includes("/") ? file.substring(0, file.lastIndexOf("/")) : "";
            // Load siblings asynchronously
            fetch("/api/browse?path=" + encodeURIComponent(dir))
              .then(r => r.json())
              .then(entries => {
                this.viewerSiblings = (entries || [])
                  .filter(e => !e.isDir && isMedia(e.name))
                  .map(e => dir ? dir + "/" + e.name : e.name);
              })
              .catch(() => { this.viewerSiblings = [file]; });
          }
          this.view = "viewer";
          this.updateHash();
        },

        get viewerIndex() {
          return this.viewerSiblings.indexOf(this.viewerFile);
        },

        viewerPrev() {
          if (this.viewerIndex > 0) {
            this.viewerFile = this.viewerSiblings[this.viewerIndex - 1];
            this.updateHash();
          }
        },

        viewerNext() {
          if (this.viewerIndex < this.viewerSiblings.length - 1) {
            this.viewerFile = this.viewerSiblings[this.viewerIndex + 1];
            this.updateHash();
          }
        },

        viewerBack() {
          if (this.viewerReturnHash) {
            location.hash = this.viewerReturnHash;
          } else {
            const dir = this.viewerFile.includes("/") ? this.viewerFile.substring(0, this.viewerFile.lastIndexOf("/")) : "";
            location.hash = "#/library/" + dir;
          }
        },

        filePath(name) {
          return this.currentPath ? this.currentPath + '/' + name : name;
        },

        toggleSelect(name) {
          const path = this.filePath(name);
          if (this.selected.has(path)) {
            this.selected.delete(path);
          } else {
            this.selected.add(path);
          }
          // Trigger reactivity
          this.selected = new Set(this.selected);
        },

        selectAll() {
          this.images.forEach(e => this.selected.add(this.filePath(e.name)));
          this.selected = new Set(this.selected);
        },

        selectNone() {
          this.selected.clear();
          this.selected = new Set(this.selected);
        },

        async browseTrash(path) {
          this.trashPath = path;
          this.trashEntries = [];
          this.trashSelected = new Set();
          this.trashSelecting = false;
          this.updateHash();
          try {
            const res = await fetch("/api/browse?path=" + encodeURIComponent(".trash/" + path));
            if (res.ok) {
              this.trashEntries = await res.json() ?? [];
            }
          } catch {
            this.trashEntries = [];
          }
        },

        trashFilePath(name) {
          return this.trashPath ? this.trashPath + '/' + name : name;
        },

        trashNavigateUp() {
          const parts = this.trashPath.split("/").filter(Boolean);
          parts.pop();
          this.browseTrash(parts.join("/"));
        },

        trashPathSegments() {
          const parts = this.trashPath.split("/").filter(Boolean);
          return parts.map((name, i) => ({
            name,
            path: parts.slice(0, i + 1).join("/"),
          }));
        },

        toggleTrashSelect(name) {
          const path = this.trashFilePath(name);
          if (this.trashSelected.has(path)) {
            this.trashSelected.delete(path);
          } else {
            this.trashSelected.add(path);
          }
          this.trashSelected = new Set(this.trashSelected);
        },

        trashSelectAll() {
          this.trashImages.forEach(e => this.trashSelected.add(this.trashFilePath(e.name)));
          this.trashSelected = new Set(this.trashSelected);
        },

        trashSelectNone() {
          this.trashSelected.clear();
          this.trashSelected = new Set(this.trashSelected);
        },

        async restoreSelected() {
          if (this.trashSelected.size === 0) return;
          const files = [...this.trashSelected];
          try {
            const res = await fetch("/api/trash/restore", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ files }),
            });
            if (res.ok) {
              this.trashSelected.clear();
              this.trashSelecting = false;
              this.browseTrash(this.trashPath);
            }
          } catch {}
        },

        async emptyTrash() {
          if (!confirm("Permanently delete all trashed files?")) return;
          try {
            await fetch("/api/trash/empty", { method: "POST" });
            this.browseTrash("");
          } catch {}
        },

        async trashSelected() {
          if (this.selected.size === 0) return;
          const files = [...this.selected];
          try {
            const res = await fetch("/api/trash", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ files }),
            });
            if (res.ok) {
              const result = await res.json();
              if (result.trashed > 0) {
                this.selected.clear();
                this.selecting = false;
                this.browse(this.currentPath);
              }
            }
          } catch {}
        },

        async findDuplicates() {
          this.dupScanning = true;
          try {
            const res = await fetch("/api/duplicates?path=" + encodeURIComponent(this.currentPath) + "&threshold=" + this.dupThreshold);
            if (res.ok) {
              const groups = await res.json();
              if (!groups || groups.length === 0) {
                alert("No duplicates found in this folder.");
                return;
              }
              this.dupGroups = groups;
              this.dupIndex = 0;
              this.dupMarked = new Set();
              this.dupCompare = new Set();
              this.dupComparing = false;
              this.dupReturnHash = location.hash;
              this.view = "duplicates";
            }
          } catch {}
          this.dupScanning = false;
        },

        toggleDupCompare(file) {
          if (this.dupCompare.has(file)) {
            this.dupCompare.delete(file);
          } else {
            this.dupCompare.add(file);
          }
          this.dupCompare = new Set(this.dupCompare);
        },

        dupCompareOpen() {
          this.dupCompareFiles = [...this.dupCompare];
          this.panes = this.dupCompareFiles.map(() => ({
            zoom: 1, fitZoom: 1, x: 0, y: 0,
          }));
          this.dupComparing = true;
        },

        paneStyle(pi) {
          const p = this.panes[pi];
          if (!p) return '';
          return 'transform: translate(' + p.x + 'px, ' + p.y + 'px) scale(' + p.zoom + ')';
        },

        zoomFit(event, pi) {
          const img = event.target;
          const pane = img.closest('.pane-img');
          if (!pane || !this.panes[pi]) return;
          const pw = pane.clientWidth;
          const ph = pane.clientHeight;
          const fit = Math.min(pw / img.naturalWidth, ph / img.naturalHeight, 1);
          const cx = (pw - img.naturalWidth * fit) / 2;
          const cy = (ph - img.naturalHeight * fit) / 2;
          if (this.zoomSynced) {
            this.panes.forEach(p => { p.fitZoom = fit; p.zoom = fit; p.x = cx; p.y = cy; });
          } else {
            const p = this.panes[pi];
            p.fitZoom = fit; p.zoom = fit; p.x = cx; p.y = cy;
          }
          this.panes = [...this.panes];
        },

        zoomReset() {
          const els = document.querySelectorAll('.pane-img');
          this.panes.forEach((p, i) => {
            const el = els[i];
            const img = el && el.querySelector('img');
            if (el && img && img.naturalWidth) {
              const fit = Math.min(el.clientWidth / img.naturalWidth, el.clientHeight / img.naturalHeight, 1);
              p.fitZoom = fit; p.zoom = fit;
              p.x = (el.clientWidth - img.naturalWidth * fit) / 2;
              p.y = (el.clientHeight - img.naturalHeight * fit) / 2;
            }
          });
          this.panes = [...this.panes];
        },

        zoomTo(level) {
          const els = document.querySelectorAll('.pane-img');
          this.panes.forEach((p, i) => {
            const el = els[i];
            if (el) {
              const cx = el.clientWidth / 2;
              const cy = el.clientHeight / 2;
              const scale = level / p.zoom;
              p.x = cx - scale * (cx - p.x);
              p.y = cy - scale * (cy - p.y);
            }
            p.zoom = level;
          });
          this.panes = [...this.panes];
        },

        zoomWheel(event, pi) {
          const delta = event.deltaY > 0 ? 0.9 : 1.1;
          const p = this.panes[pi];
          if (!p) return;
          const newZoom = Math.max(0.05, Math.min(20, p.zoom * delta));
          const rect = event.currentTarget.getBoundingClientRect();
          const cx = event.clientX - rect.left;
          const cy = event.clientY - rect.top;
          const scale = newZoom / p.zoom;
          const newX = cx - scale * (cx - p.x);
          const newY = cy - scale * (cy - p.y);
          if (this.zoomSynced) {
            const dx = newX - p.x;
            const dy = newY - p.y;
            this.panes.forEach(pp => {
              pp.x = (pp === p) ? newX : pp.x + dx;
              pp.y = (pp === p) ? newY : pp.y + dy;
              pp.zoom = newZoom;
            });
          } else {
            p.zoom = newZoom; p.x = newX; p.y = newY;
          }
          this.panes = [...this.panes];
        },

        panStart(event, pi) {
          this.panActive = true;
          this.panActivePane = pi;
          this.panStartX = event.clientX;
          this.panStartY = event.clientY;
          this.panOriginX = this.panes[pi].x;
          this.panOriginY = this.panes[pi].y;
        },

        panMove(event, pi) {
          if (!this.panActive) return;
          const dx = event.clientX - this.panStartX;
          const dy = event.clientY - this.panStartY;
          const src = this.panActivePane;
          if (this.zoomSynced) {
            this.panes.forEach((p, i) => {
              if (i === src) {
                p.x = this.panOriginX + dx;
                p.y = this.panOriginY + dy;
              } else {
                p.x += (event.movementX || 0);
                p.y += (event.movementY || 0);
              }
            });
          } else {
            this.panes[src].x = this.panOriginX + dx;
            this.panes[src].y = this.panOriginY + dy;
          }
          this.panes = [...this.panes];
        },

        panEnd() {
          this.panActive = false;
          this.panActivePane = -1;
        },

        get currentZoomPct() {
          return this.panes.length > 0 ? Math.round(this.panes[0].zoom * 100) : 100;
        },

        toggleDupMark(file) {
          if (this.dupMarked.has(file)) {
            this.dupMarked.delete(file);
          } else {
            this.dupMarked.add(file);
          }
          this.dupMarked = new Set(this.dupMarked);
        },

        async dupTrash() {
          if (this.dupMarked.size === 0) return;
          const files = [...this.dupMarked];
          try {
            const res = await fetch("/api/trash", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ files }),
            });
            if (res.ok) {
              // Remove trashed files from current group
              const current = this.dupGroups[this.dupIndex];
              current.files = current.files.filter(f => !this.dupMarked.has(f));
              this.dupMarked = new Set();
              this.dupCompare = new Set();
              this.dupComparing = false;
              // If group has <2 files left, remove it and advance
              if (current.files.length < 2) {
                this.dupGroups.splice(this.dupIndex, 1);
                if (this.dupGroups.length === 0) {
                  alert("All duplicate groups resolved!");
                  this.dupBack();
                  return;
                }
                if (this.dupIndex >= this.dupGroups.length) {
                  this.dupIndex = this.dupGroups.length - 1;
                }
              }
            }
          } catch {}
        },

        dupSkip() {
          this.dupMarked = new Set();
          this.dupCompare = new Set();
          this.dupComparing = false;
          if (this.dupIndex < this.dupGroups.length - 1) {
            this.dupIndex++;
          }
        },

        dupBack() {
          this.view = "browse";
          if (this.dupReturnHash) {
            location.hash = this.dupReturnHash;
          } else {
            this.browse(this.currentPath);
          }
        },

        fileType(name) {
          const ext = name.slice(name.lastIndexOf(".")).toLowerCase();
          if (RAW_EXTS.has(ext)) return { type: "raw", label: ext.slice(1) };
          if (VIDEO_EXTS.has(ext)) return { type: "video", label: ext.slice(1) };
          if (ext === ".jpg" || ext === ".jpeg") return { type: "jpeg", label: "jpg" };
          return { type: "other", label: ext.slice(1) };
        },

        navigateUp() {
          const parts = this.currentPath.split("/").filter(Boolean);
          parts.pop();
          this.browse(parts.join("/"));
        },

        pathSegments() {
          const parts = this.currentPath.split("/").filter(Boolean);
          return parts.map((name, i) => ({
            name,
            path: parts.slice(0, i + 1).join("/"),
          }));
        },

        connectWs() {
          const protocol = location.protocol === "https:" ? "wss:" : "ws:";
          const ws = new WebSocket(protocol + "//" + location.host + "/ws");
          ws.onopen = () => { this.connected = true; };
          ws.onclose = () => {
            this.connected = false;
            setTimeout(() => this.connectWs(), 2000);
          };
          ws.onmessage = (event) => {
            const status = JSON.parse(event.data);
            const idx = this.statuses.findIndex(s => s.file === status.file);
            if (idx >= 0) {
              this.statuses[idx] = status;
            } else {
              this.statuses = [status, ...this.statuses].slice(0, 200);
            }
          };
        },
      };
    }
  </script>
</body>
</html>
